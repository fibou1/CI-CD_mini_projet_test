name: "Application Pipeline"

on:
  push:
  workflow_dispatch:
    inputs:
      target_sub_env:
        description: "Sous-environnement cible (ex: sandbox)"
        required: false
        default: "sandbox"
  schedule:
    - cron: "0 0 * * *"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "Clonage du depot"
        uses: actions/checkout@v5

      - name: "Configuration du Cache npm"
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: "Execution de la suite de tests"
        run: npm test

      - name: "Publication du Rapport de Tests"
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: '**/junit.xml'

      - name: "Verification Securite et Masquage"
        env:
          CURRENT_ENV: ${{ vars.APP_ENVIRONMENT }}
          SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
        run: |
          echo "L'environnement actuel est : $CURRENT_ENV"
          echo "Tentative d'affichage de la cle secrete : $SECRET_KEY"
  deploy-staging-prod:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production        # déclenche l'approbation humaine
    steps:
      - name: Simulate deploy
        run: echo "Deploiement en production simule avec succes"
